name: Deploy to AWS EC2 (nueva arquitectura)

# Runs on every push to main (automatic deploy). workflow_dispatch remains
# available for manual runs with an optional image tag.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        default: ""

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: jpv-backend

permissions:
  id-token: write   # Required for OIDC token exchange (Mejora 1)
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Mejora 1: OIDC — no stored AWS credentials in GitHub Secrets ─────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-${{ github.sha }}"
          fi
          echo "value=$TAG" >> $GITHUB_OUTPUT

      # Build context is repo root so Dockerfile.bundled can access both
      # frontend/ and backend/src/ directories.
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker build \
            -f backend/src/JoiabagurPV.API/Dockerfile.bundled \
            --build-arg VITE_API_BASE_URL=https://${{ secrets.PRODUCTION_DOMAIN }}/api \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Deploy via SSM (no SSH port needed, no key management) ───────────────
      - name: Verify EC2 is visible to SSM (Online)
        run: |
          set -euo pipefail
          IID=$(echo -n "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '[:space:]')
          echo "Checking SSM registration for instance: $IID"
          PING=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$IID" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text)
          echo "PingStatus: $PING"
          if [ "$PING" != "Online" ]; then
            echo "::error::SSM PingStatus is '$PING', expected Online. Wait a few minutes after first boot, or fix IAM instance profile / outbound HTTPS to SSM endpoints."
            exit 1
          fi

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          IID=$(echo -n "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '[:space:]')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$IID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['/usr/local/bin/jpv-deploy.sh $ECR_REGISTRY/$ECR_REPOSITORY $IMAGE_TAG']" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"

          # Poll until the command finishes (max ~10 min). Do not hide API errors as "Pending".
          for i in $(seq 1 60); do
            ERRFILE=$(mktemp)
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$IID" \
              --query "Status" \
              --output text 2>"$ERRFILE") && RC=0 || RC=$?
            if [ "$RC" != "0" ]; then
              echo "Attempt $i: get-command-invocation not ready yet (rc=$RC): $(cat "$ERRFILE")"
              STATUS="Pending"
            fi
            rm -f "$ERRFILE"

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded."
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$IID" \
                --query "StandardErrorContent" \
                --output text
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$IID" \
                --query "StandardOutputContent" \
                --output text
              exit 1
            fi
            sleep 10
          done

          echo "Timed out waiting for deployment."
          exit 1

      - name: Verify health check
        run: |
          echo "Waiting 15s for container to start..."
          sleep 15
          curl -sf "https://${{ secrets.PRODUCTION_DOMAIN }}/api/health" \
            && echo "Health check passed." \
            || echo "Health check failed (non-blocking — check manually)."
        continue-on-error: true
