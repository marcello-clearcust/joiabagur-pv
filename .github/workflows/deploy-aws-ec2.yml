name: Deploy to AWS EC2 (nueva arquitectura)

# Only triggered manually. The current deploy-backend-aws.yml and
# deploy-frontend-aws.yml workflows remain active for the existing App Runner
# deployment until the migration is complete.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        default: ""

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: jpv-backend

permissions:
  id-token: write   # Required for OIDC token exchange (Mejora 1)
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Mejora 1: OIDC — no stored AWS credentials in GitHub Secrets ─────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-${{ github.sha }}"
          fi
          echo "value=$TAG" >> $GITHUB_OUTPUT

      # Build context is repo root so Dockerfile.bundled can access both
      # frontend/ and backend/src/ directories.
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker build \
            -f backend/src/JoiabagurPV.API/Dockerfile.bundled \
            --build-arg VITE_API_BASE_URL=https://${{ secrets.PRODUCTION_DOMAIN }}/api \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Deploy via SSM (no SSH port needed, no key management) ───────────────
      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['/usr/local/bin/jpv-deploy.sh $ECR_REGISTRY/$ECR_REPOSITORY $IMAGE_TAG']" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"

          # Poll until the command finishes (max ~5 min)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 10
          done

          echo "Timed out waiting for deployment."
          exit 1

      - name: Verify health check
        run: |
          echo "Waiting 15s for container to start..."
          sleep 15
          curl -sf "https://${{ secrets.PRODUCTION_DOMAIN }}/api/health" \
            && echo "Health check passed." \
            || echo "Health check failed (non-blocking — check manually)."
        continue-on-error: true
